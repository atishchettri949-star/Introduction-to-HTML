<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend><b>Enter Your Marks</b></legend>
        <form
            oninput = "x.value= (parseInt(m1.value)+parseInt(m2.value)+parseInt(m3.value))/3">
            <label>Name</label><br>
            <input type="text" id="name"><br><br>
            <label>Enter Marks</label><br>
            <select name="subject" id="subject">
                <option value="maths"> Maths </option>
                <option value="science"> Science </option>
                <option value="english"> English </option>
            </select>
            <input type="number" id="m1" name="m1"><br><br>
             <select name="subject2" id="subject">
                <option value="maths"> Maths </option>
                <option value="science"> Science </option>
                <option value="english"> English </option>
            </select>
          
            <input type="number" id="m2" name="m2"><br><br>
 <select name="subject3" id="subject3">
                <option value="maths"> Maths </option>
                <option value="science"> Science </option>
                <option value="english"> English </option>
            </select>
            <input type="number" id="m3" name="m3"><br><br>
            <label>Average Marks</label><br>
            <output name="x" for="m1 m2 m3"></output><br><br>




        </form>

    </fieldset>
</body>
</html
