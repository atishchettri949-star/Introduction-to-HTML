<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Ordered list</h1>
    <ol>
        <li>First</li>
        <li>Second</li>
        <li>third</li>
        <li>Fourth</li>
    </ol>
    <h1>unodered list</h1>
    <ul>
        <li>first</li>
        <li>second</li>
        <li>third</li>
        <li>fourth</li>
    </ul>
    <h1>Definition List</h1>
    <dl>Tea</dl>
    <dd>hot drink</dd>
    <dl>pepsi</dl>
    <dd>cold drink</dd>
</body>
</html>
